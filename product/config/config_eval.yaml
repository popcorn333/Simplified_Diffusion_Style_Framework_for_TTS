hydra:
  job:
    name : '${basename}_inf'
    chdir: true
    config:
      override_dirname:
        kv_sep: ':'
        item_sep: '__'
        exclude_keys:
          - data
          - eval.evaluation_mode 
  run:
    dir: ../hydra_outputs/${hydra.job.name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
 
  sweep:
    dir: ${hydra.job.name}
    subdir: ${hydra.job.override_dirname}

basename: product

data:

eval:
  split: test     #train, dev, test
  starting_epoch: 50
  ending_epoch: 60
  n_timesteps: 10
  checkpoint_dir: ../Hydra_${basename}/checkpoint
  code_dir: ../
  gt_dir: ground_truth
  cvt_dir: converted
  epoch_interval: 1
  evaluation_mode: 'WAVPDFMEL'
  batch_size: 72
  gpu: 1
  spk: 0

model:
  spk_emb_dim: 128

  encoder:
    n_channels: 192
    filter_channels: 768
    filter_channels_dp: 256
    n_layers: 6
    kernel_size: 3
    p_dropout: 0.1
    n_heads: 2
    window_size: 4

  decoder:
    dim: 64
    beta_min: 0.05
    beta_max: 20.0
    pe_scale: 1000

  masking:
    a: 0.05
    b: 0.01
    c: 0
    d: 0
    l: 1
    p: 0

training:
  load_encoder: True
  load_decoder: False
  train_encoder: False  
  n_timesteps: 10
  tensorboard_dir: tb
  start_checkpoint:
  checkpoint_save: 'checkpoint'
  test_size: 1
  batch_size: 48
  n_epochs: 800
  learning_rate: 1e-4
  seed: 37
  save_every: 10
  gpu: 0
  num_workers: 4

